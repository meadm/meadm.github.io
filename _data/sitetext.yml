en: &DEFAULT_EN
  header:
    title: A collaborative partner for
    text: Unlocking insight from biological data
    button: Explore Services
    buttonlink: "#services"

  services:
    title: "Services"
    text: "Science. Data. Solutions."
    section: services
    list:
      - title: "Multi-omics Analysis"
        desc: "Customized analyses for integrating transcriptomic, genomic, and other datasets. Specializing in de novo assembly and expression analysis for complex systems."
        icon: fas fa-dna #find more at https://fontawesome.com/icons
      - title: "Pipeline Development"
        desc: "Building robust, scalable, and reproducible computational pipelines. Transitioning manual scripts into automated workflows optimized for HPC or cloud environments."
        icon: fas fa-project-diagram
      - title: "Data & Research Strategy"
        desc: "Bridging biological hypotheses and technical execution. Expertise in experimental design, data landscaping, and technical reviews to guide R&D investment."
        icon: fas fa-lightbulb

  portfolio:
    title: "Selected Work"
    text: "Proven Computational Solutions for Complex Biological Questions"
    section: "portfolio"
    closebutton: "Close Project"

  timeline:
    title: "The Story"
    text: "From Research to Industry"
    section: timeline
    # left is the default
    #start_align: "left"
    events:
      - title: "B.S. - Iowa State University"
        year: "2005-2009"
        desc: "Conducted foundational research in natural product biosynthesis and molecular biology."
        image: assets/img/timeline/Iowa_State_University_seal.png
        alt:
      - title: "Ph.D. - University of Wisconsin-Madison"
        year: "2009-2015"
        desc: "Integrated wet- and dry-lab approaches to decipher complex transcriptional regulatory networks in fungal pathogens."
        image: assets/img/timeline/uw-crest-color-web-digital_resized.png
        alt:
      - title: "Postdoctoral Scholar - Vanderbilt University"
        year: "2015-2022"
        desc: "Directed multi-omic research investigating the evolution of fungi relevant to human health and industrial applications."
        image: assets/img/timeline/vandy_logo_resized.png
        alt: image alt text
      - title: "Ginkgo Bioworks - NGS Bioinformatics and Solutions Delivery"
        year: "2022-2025"
        desc: "Engineered custom genomics workflows while managing R&D and client projects."
        image: assets/img/timeline/ginkgo_bioworks_logo.jpg
        alt:
      - title: "Prairie Helix Consulting"
        year: "2025-Present"
        desc: "Empowering research teams with specialized genomic analysis and strategic computational support."
        image: assets/img/timeline/PraireHelix_logo_resized_red.png
        alt:      
    end: "Partnering <br> to Unlock <br> Biology"

  about:
    title: "The Product"
    text: "Technical Execution & Strategic Oversight"
    body: "I provide an integrated bioinformatics engine for your research. As an independent lead, I deliver the direct technical oversight and biological intuition necessary to transform raw data into reproducible, high-impact results. This approach ensures your R&D goals stay on track and on budget. For direct inquiries, you can reach me via the Contact form below or at <br> mead [dot] bioinformatics [at] gmail.com"
    section: about

  clients:
    section: clients
    title: "lorem epsum"
    max-height: 100px
    horizontal-scrolling: "" #"yes/no"
    list:
      - title: ""

  team:
    title: "About Me"
    text: "Bridging Biology and Computation to Drive Insight"
    subtext: I’m a Ph.D.-trained bioinformatician specializing in genomics and computational analysis of next-generation sequencing data, particularly from fungal and other non-model systems. My work transforms raw data into actionable insights through Python and R workflows, enabling clients to tackle some of the most challenging problems in biology.
    section: team
    people:
      - name: "Matt Mead"
        role: "Founder and Lead Bioinformatician"
        image: assets/img/team/Matt Mead_2022-12.jpg
        social:
          - url: https://www.linkedin.com/in/matt-mead-253b609b/
            icon: fab fa-linkedin-in
          - url: https://github.com/meadm
            icon: fab fa-github
          - url: https://scholar.google.com/citations?user=iM5iuGoAAAAJ&hl=en
            icon: fas fa-graduation-cap

  contact:
    title: "Contact"
    text: "Please use the form below to share your project goals. <br> You can also reach me directly at mead [dot] bioinformatics [at] gmail.com."
    section: contact
    name: "Name*"
    name-validation: "Please enter your name."
    email: "Email*"
    email-validation: "Please enter your email address."
    phone: "Phone Number"
    phone-validation: "Please enter your phone number."
    message: "Message*"
    message-validation: "Please enter a message."
    subject: "Contact Form Submission"
    submit: "Send Message"

  footer:
    legal: "Privacy Policy"
    social:
      - url: https://www.linkedin.com/in/matt-mead-253b609b/
        icon: fab fa-linkedin-in
      - url: https://github.com/meadm
        icon: fab fa-github
      - url: https://scholar.google.com/citations?user=iM5iuGoAAAAJ&hl=en
        icon: fas fa-graduation-cap
